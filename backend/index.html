<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrocodileDetector</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:        #0C0C0F;
  --surface:   #16161A;
  --surface2:  #1C1C22;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.13);
  --text-1:    #F0F0F4;
  --text-2:    #9898A8;
  --text-3:    #52525E;
  --accent:    #4F8EF7;
  --safe:      #00C896;
  --safe-dim:  rgba(0,200,150,0.1);
  --caution:   #F5A623;
  --caution-dim:rgba(245,166,35,0.1);
  --danger:    #FF4545;
  --danger-dim:rgba(255,69,69,0.1);
  --sans:      'Noto Sans KR',sans-serif;
  --mono:      'DM Mono',monospace;
  --r:         14px;
  --r-lg:      20px;
}

body{
  background:var(--bg);color:var(--text-1);
  font-family:var(--sans);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  -webkit-font-smoothing:antialiased;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 55% 35% at 15% 8%,rgba(79,142,247,0.07) 0%,transparent 70%),
    radial-gradient(ellipse 45% 30% at 85% 92%,rgba(0,200,150,0.05) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;width:100%;max-width:580px;padding:60px 20px 80px}

/* ── 헤더 ── */
header{text-align:center;margin-bottom:44px}
.logo{
  display:inline-flex;align-items:center;justify-content:center;
  width:50px;height:50px;background:var(--surface2);
  border:1px solid var(--border-hi);border-radius:13px;font-size:24px;margin-bottom:18px;
}
header h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
header p{margin-top:7px;font-size:13px;color:var(--text-2);line-height:1.65}

/* ── 입력 카드 ── */
.input-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:22px;margin-bottom:16px;
  transition:border-color .2s;
}
.input-card:focus-within{border-color:var(--border-hi)}
.input-label{
  display:block;font-size:11px;font-weight:600;
  letter-spacing:.8px;text-transform:uppercase;color:var(--text-3);margin-bottom:11px;
}
.input-row{display:flex;gap:9px}
.url-input{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:12px 15px;
  font-family:var(--mono);font-size:13px;color:var(--text-1);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.url-input::placeholder{color:var(--text-3)}
.url-input:focus{border-color:rgba(79,142,247,.5);box-shadow:0 0 0 3px rgba(79,142,247,.1)}
.btn-scan{
  flex-shrink:0;background:var(--accent);color:#fff;border:none;
  border-radius:10px;padding:12px 20px;
  font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;
  transition:opacity .15s,transform .1s;white-space:nowrap;
}
.btn-scan:hover{opacity:.85}
.btn-scan:active{transform:scale(.97)}
.btn-scan:disabled{opacity:.35;cursor:not-allowed}

/* ── 로딩 ── */
.loading-card{
  display:none;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);padding:36px 28px;margin-bottom:16px;text-align:center;
}
.loading-card.show{display:block;animation:fadeIn .3s}
.rings{position:relative;width:68px;height:68px;margin:0 auto 18px}
.ring{position:absolute;border-radius:50%;border:2px solid transparent}
.ring-1{inset:0;   border-top-color:var(--accent);       animation:spin 1s linear infinite}
.ring-2{inset:10px;border-top-color:rgba(79,142,247,.35);animation:spin 1.5s linear infinite reverse}
.ring-3{inset:20px;border-top-color:rgba(79,142,247,.15);animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-size:15px;font-weight:600;margin-bottom:5px}
.loading-sub{font-size:12.5px;color:var(--text-2);line-height:1.6}
.steps{display:flex;justify-content:center;gap:20px;margin-top:22px}
.step{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-3);transition:color .3s}
.step.active{color:var(--accent)}
.step.done{color:var(--safe)}
.step-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.step.active .step-dot{animation:pdot 1s ease infinite}
@keyframes pdot{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}

/* ── 에러 ── */
.error-card{
  display:none;background:rgba(255,69,69,.07);border:1px solid rgba(255,69,69,.2);
  border-radius:var(--r);padding:16px 18px;margin-bottom:16px;
  font-size:13.5px;color:var(--danger);line-height:1.6;
}
.error-card.show{display:block;animation:fadeIn .3s}

/* ── 결과 ── */
#result{display:none}
#result.show{display:block;animation:slideUp .4s cubic-bezier(.22,1,.36,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── 판정 카드 ── */
.verdict-card{
  border-radius:var(--r-lg);padding:24px;margin-bottom:12px;
  border:1px solid;position:relative;overflow:hidden;
}
.verdict-card.SAFE   {background:var(--safe-dim);   border-color:rgba(0,200,150,.22); color:var(--safe)}
.verdict-card.CAUTION{background:var(--caution-dim);border-color:rgba(245,166,35,.22);color:var(--caution)}
.verdict-card.DANGER {background:var(--danger-dim); border-color:rgba(255,69,69,.22); color:var(--danger)}

.verdict-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.verdict-label{font-size:10.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.6;margin-bottom:7px}
.verdict-text{font-size:28px;font-weight:700;letter-spacing:-.5px}

/* 점수 링 */
.score-ring{flex-shrink:0;width:62px;height:62px;position:relative}
.score-ring svg{transform:rotate(-90deg)}
.sr-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:4}
.sr-fill{fill:none;stroke:currentColor;stroke-width:4;stroke-linecap:round;
         stroke-dasharray:158;stroke-dashoffset:158;
         transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.score-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:14px;font-weight:500;color:currentColor;
}

.verdict-reason{
  margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.07);
  font-size:13px;color:var(--text-2);line-height:1.7;
}
.verdict-reason b{color:currentColor;font-weight:600}

/* ── 아코디언 토글 버튼 ── */
.guide-toggle{
  width:100%;display:flex;align-items:center;justify-content:center;
  gap:6px;margin-top:14px;padding-top:12px;
  border-top:1px solid rgba(255,255,255,.07);
  background:none;border-left:none;border-right:none;border-bottom:none;
  cursor:pointer;font-family:var(--sans);font-size:12px;
  color:rgba(255,255,255,.3);transition:color .2s;
}
.guide-toggle:hover{color:rgba(255,255,255,.6)}
.guide-arrow{
  font-size:10px;transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:inline-block;
}
.guide-arrow.open{transform:rotate(180deg)}

/* ── 가이드 아코디언 ── */
.guide-box{
  overflow:hidden;
  max-height:0;
  transition:max-height .4s cubic-bezier(.4,0,.2,1), opacity .3s;
  opacity:0;
}
.guide-box.open{
  max-height:300px;
  opacity:1;
}
.guide-inner{
  margin-top:14px;padding:16px;
  background:rgba(0,0,0,.2);
  border-radius:10px;
}
.guide-inner p{
  font-size:13px;color:var(--text-2);line-height:1.8;
}
.guide-inner p+p{margin-top:8px}
.guide-inner strong{color:var(--text-1);font-weight:600}

/* ── 정보 그리드 ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.cell{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:15px 16px;transition:border-color .2s;
}
.cell:hover{border-color:var(--border-hi)}
.cell-label{font-size:10.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.cell-value{font-size:15px;font-weight:600;font-family:var(--mono);color:var(--text-1);word-break:break-all}
.cell-value.na{color:var(--text-3);font-weight:400;font-size:13px;font-family:var(--sans)}

/* ── 리다이렉트 배너 ── */
.redirect-banner{
  display:none;background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.2);
  border-radius:var(--r);padding:13px 16px;margin-bottom:12px;
  font-size:12.5px;color:var(--caution);line-height:1.65;
}
.redirect-banner.show{display:block}
.redirect-url{margin-top:6px;font-family:var(--mono);font-size:11.5px;color:var(--text-2);word-break:break-all}

/* ── 스크린샷 ── */
.ss-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;
}
.ss-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--border);
}
.ss-header span{font-size:10.5px;font-weight:600;letter-spacing:.7px;text-transform:uppercase;color:var(--text-3)}
.ss-header a{font-size:11.5px;color:var(--accent);text-decoration:none;font-weight:500}
.ss-header a:hover{text-decoration:underline}
.ss-img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;background:var(--surface2)}
.ss-empty{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-3);gap:7px}

/* ── 뱃지 ── */
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--sans)}
.badge-kisa   {background:rgba(79,142,247,.15);color:var(--accent)}
.badge-whois  {background:rgba(152,152,168,.12);color:var(--text-2)}
.badge-unavail{background:rgba(82,82,94,.2);color:var(--text-3)}

/* ── 메타 행 ── */
.meta-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:12px 16px;margin-bottom:12px;gap:12px;
}
.meta-domain{font-family:var(--mono);font-size:12px;color:var(--text-2);word-break:break-all;flex:1}
.meta-time{font-size:11px;color:var(--text-3);flex-shrink:0}

.disclaimer{margin-top:10px;font-size:11px;color:var(--text-3);text-align:center;line-height:1.7}

@media(max-width:480px){
  .grid{grid-template-columns:1fr}
  .input-row{flex-direction:column}
  .btn-scan{width:100%}
  .wrap{padding:40px 16px 60px}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#5D8BFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="#5D8BFF" fill-opacity="0.1" stroke-opacity="0.5"></path>
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
      </svg>
    </div>
    <h1>CrocodileDetector</h1>
    <p>의심스러운 URL을 입력하면<br>보안 엔진 + 도메인 분석으로 위험을 판정해요</p>
  </header>

  <div class="input-card">
    <label class="input-label" for="urlInput">검사할 URL</label>
    <div class="input-row">
      <input id="urlInput" class="url-input" type="text"
        placeholder="https://example.com 또는 도메인만 입력"
        autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="btn-scan" id="btnScan" onclick="analyze()">검사하기</button>
    </div>
  </div>

  <div class="loading-card" id="loadingCard">
    <div class="rings">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>
    <div class="loading-title">분석 중이에요</div>
    <div class="loading-sub">urlscan.io 스캔 완료까지 최대 60초 소요될 수 있어요</div>
    <div class="steps">
      <div class="step" id="s1"><div class="step-dot"></div>urlscan</div>
      <div class="step" id="s2"><div class="step-dot"></div>WHOIS</div>
      <div class="step" id="s3"><div class="step-dot"></div>판정</div>
    </div>
  </div>

  <div class="error-card" id="errorCard"></div>

  <div id="result">

    <div class="meta-row">
      <span class="meta-domain" id="rDomain"></span>
      <span class="meta-time" id="rTime"></span>
    </div>

    <!-- 판정 카드 -->
    <div class="verdict-card" id="verdictCard">
      <div class="verdict-top">
        <div>
          <div class="verdict-label">종합 판정</div>
          <div class="verdict-text" id="rVerdictKo"></div>
        </div>
        <div class="score-ring">
          <svg viewBox="0 0 54 54" width="62" height="62">
            <circle class="sr-track" cx="27" cy="27" r="25"/>
            <circle class="sr-fill" cx="27" cy="27" r="25" id="srFill"/>
          </svg>
          <div class="score-num" id="rScore"></div>
        </div>
      </div>

      <!-- 판정 근거 -->
      <div class="verdict-reason" id="rReason"></div>

      <!-- 아코디언 토글 버튼 -->
      <button class="guide-toggle" id="guideToggle" onclick="toggleGuide()">
        이게 무슨 뜻인가요?
        <span class="guide-arrow" id="guideArrow">▼</span>
      </button>

      <!-- 가이드 아코디언 -->
      <div class="guide-box" id="guideBox">
        <div class="guide-inner" id="guideInner"></div>
      </div>
    </div>

    <div class="redirect-banner" id="redirectBanner">
      ⚠️ 입력한 주소가 <b>다른 도메인</b>으로 리다이렉트됩니다
      <div class="redirect-url" id="rFinalUrl"></div>
    </div>

    <div class="grid">
      <div class="cell">
        <div class="cell-label">도메인 나이</div>
        <div class="cell-value" id="rAgeDays"></div>
      </div>
      <div class="cell">
        <div class="cell-label">도메인 생성일</div>
        <div class="cell-value" id="rCreation"></div>
      </div>
      <div class="cell">
        <div class="cell-label">서버 국가</div>
        <div class="cell-value" id="rCountry"></div>
      </div>
      <div class="cell">
        <div class="cell-label">WHOIS 출처</div>
        <div class="cell-value" id="rWhoisSrc"></div>
      </div>
    </div>

    <div class="ss-card" id="ssCard">
      <div class="ss-header">
        <span>사이트 스크린샷</span>
        <a id="ssLink" href="#" target="_blank" rel="noopener noreferrer">원본 보기 ↗</a>
      </div>
      <img class="ss-img" id="ssImg" src="" alt="스크린샷"/>
      <div class="ss-empty" id="ssEmpty" style="display:none">🚫 스크린샷 없음</div>
    </div>

  </div>

  <p class="disclaimer">
    이 결과는 참고용이며 100% 정확도를 보장하지 않아요.<br>
    최종 판단은 직접 하셔야 해요.
  </p>
</div>

<script>
const $ = id => document.getElementById(id)

const WHOIS_BADGE = {
  'kisa':         '<span class="badge badge-kisa">KISA</span>',
  'python-whois': '<span class="badge badge-whois">python-whois</span>',
  'unavailable':  '<span class="badge badge-unavail">확인 불가</span>',
}

/* ── 판정별 가이드 문구 ───────────────────────────────────────── */
function getGuideHTML(verdict, data) {
  const age = data.domain_age_days
  const success = data.urlscan_success

  if (verdict === 'DANGER') {
    return `
      <p>🚨 <strong>보안 엔진이 이 사이트를 악성으로 판정했어요.</strong></p>
      <p>절대 접속하지 마세요. 개인정보나 금융정보를 이미 입력했다면
      즉시 비밀번호를 변경하고 해당 금융기관에 연락하세요.</p>
      <p>보이스피싱 피해가 의심되면 ☎ 금융감독원 <strong>1332</strong>로 신고할 수 있어요.</p>
    `
  }

  if (verdict === 'CAUTION') {
    if (!success && age !== null) {
      return `
        <p>⚠️ <strong>보안 검사를 정상적으로 완료하지 못한 도메인이에요.</strong></p>
        <p>이 도메인은 생성된 지 <strong>${age}일</strong>밖에 되지 않았어요.
        공식 기관이나 금융사 사이트는 보통 수년 이상 운영돼요.</p>
        <p>문자나 SNS로 받은 링크라면 클릭하지 말고,
        공식 앱이나 검색엔진으로 직접 찾아 접속하세요.</p>
      `
    }
    if (!success) {
      return `
        <p>⚠️ <strong>보안 검사를 완료하지 못했어요 (DNS 오류 또는 응답 없음).</strong></p>
        <p>정상적인 공식 사이트라면 보안 검사가 정상 통과돼야 해요.
        접속을 자제하고, 해당 기관의 공식 앱이나 대표 전화로 확인하세요.</p>
      `
    }
    if (age !== null && age <= 7) {
      return `
        <p>⚠️ <strong>생성된 지 매우 짧은 도메인이에요.</strong></p>
        <p>이 도메인은 생성된 지 <strong>${age}일</strong>밖에 되지 않았어요.
        공식 서비스는 오래된 도메인을 사용해요.</p>
        <p>보안 엔진이 아직 이 도메인을 탐지하지 못했을 수 있어요.
        문자나 SNS로 받은 링크라면 클릭하지 마세요.</p>
      `
    }
    return `
      <p>⚠️ <strong>일부 위험 신호가 감지됐어요.</strong></p>
      <p>urlscan.io 점수가 기준 이상이에요.
      개인정보나 금융정보 입력은 삼가세요.</p>
      <p>해당 기관의 공식 앱이나 검색엔진으로 접속하는 것을 권장해요.</p>
    `
  }

  // SAFE
  return `
    <p>✅ <strong>현재까지 특이사항이 발견되지 않았어요.</strong></p>
    <p>그래도 개인정보나 금융정보를 입력할 때는 항상 주의하세요.
    주소창의 자물쇠 아이콘(🔒)과 도메인을 한 번 더 확인해보세요.</p>
    <p>이 결과는 참고용이며 100% 안전을 보장하지 않아요.</p>
  `
}

/* ── 아코디언 토글 ───────────────────────────────────────────── */
function toggleGuide() {
  const box   = $('guideBox')
  const arrow = $('guideArrow')
  const isOpen = box.classList.contains('open')
  box.classList.toggle('open', !isOpen)
  arrow.classList.toggle('open', !isOpen)
}

/* ── 로딩 단계 ───────────────────────────────────────────────── */
let _stepTimer
function startSteps() {
  ['s1','s2','s3'].forEach(s => $(s).className='step')
  let i = 0
  const ids = ['s1','s2','s3']
  function tick() {
    if (i > 0) $(ids[i-1]).classList.replace('active','done')
    if (i < ids.length) { $(ids[i]).classList.add('active'); i++; _stepTimer=setTimeout(tick,20000) }
  }
  tick()
}
function doneSteps() {
  clearTimeout(_stepTimer)
  ;['s1','s2','s3'].forEach(s => { $(s).classList.remove('active'); $(s).classList.add('done') })
}

/* ── 분석 실행 ───────────────────────────────────────────────── */
async function analyze() {
  const url = $('urlInput').value.trim()
  if (!url) { $('urlInput').focus(); return }

  $('errorCard').className   = 'error-card'
  $('result').className      = ''
  $('loadingCard').className = 'loading-card show'
  $('btnScan').disabled      = true
  // 아코디언 닫기
  $('guideBox').classList.remove('open')
  $('guideArrow').classList.remove('open')
  startSteps()

  try {
    const res  = await fetch('/analyze/url', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url}),
    })
    const data = await res.json()
    if (!res.ok) throw new Error(data.detail || `서버 오류 (${res.status})`)
    doneSteps()
    $('loadingCard').className = 'loading-card'
    render(data)
  } catch(e) {
    doneSteps()
    $('loadingCard').className = 'loading-card'
    $('errorCard').textContent = '⚠️ ' + (e.message || '알 수 없는 오류가 발생했어요.')
    $('errorCard').className   = 'error-card show'
  } finally {
    $('btnScan').disabled = false
  }
}

/* ── 결과 렌더링 ─────────────────────────────────────────────── */
function render(d) {
  $('rDomain').textContent = d.domain
  $('rTime').textContent   = d.analyzed_at
    ? new Date(d.analyzed_at).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
    : ''

  // 판정 카드
  const card = $('verdictCard')
  card.className = `verdict-card ${d.verdict}`
  $('rVerdictKo').textContent = d.verdict_ko

  // 점수 링
  const score = d.urlscan_score ?? 0
  const circ  = 157
  const fill  = $('srFill')
  fill.style.strokeDashoffset = circ
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.strokeDashoffset = circ - (score / 100) * circ
  }))
  $('rScore').textContent = d.urlscan_score !== null ? score : '–'

  // 판정 근거
  $('rReason').innerHTML = `<b>판정 근거</b> &nbsp;${d.verdict_reason}`

  // 가이드 문구 세팅 (닫힌 상태로)
  $('guideInner').innerHTML = getGuideHTML(d.verdict, d)

  // 리다이렉트
  if (d.is_redirected && d.final_url) {
    $('redirectBanner').className = 'redirect-banner show'
    $('rFinalUrl').textContent    = `→ ${d.final_url}`
  } else {
    $('redirectBanner').className = 'redirect-banner'
  }

  // 도메인 나이
  $('rAgeDays').innerHTML = d.domain_age_days !== null
    ? `${d.domain_age_days}<span style="font-size:12px;color:var(--text-3);font-family:var(--sans)"> 일</span>`
    : '<span class="na">–</span>'

  // 생성일
  $('rCreation').innerHTML = d.creation_date || '<span class="na">–</span>'

  // 서버 국가
  if (d.server_country) {
    const isKr = d.server_country.toUpperCase() === 'KR'
    const flagEmoji = String.fromCodePoint(
      ...[...d.server_country.toUpperCase()].map(c => c.charCodeAt(0) + 127397)
    )
    $('rCountry').innerHTML = `${flagEmoji} ${d.server_country}`
      + (isKr ? '' : `<span style="font-size:11px;color:var(--caution);margin-left:6px">해외</span>`)
  } else {
    $('rCountry').innerHTML = '<span class="na">–</span>'
  }

  // WHOIS 출처
  $('rWhoisSrc').innerHTML = WHOIS_BADGE[d.whois_source] ?? d.whois_source

  // 스크린샷
  if (d.screenshot_url) {
    $('ssImg').src             = d.screenshot_url
    $('ssImg').style.display   = 'block'
    $('ssEmpty').style.display = 'none'
    $('ssLink').href           = d.screenshot_url
    $('ssLink').style.display  = ''
  } else {
    $('ssImg').style.display   = 'none'
    $('ssEmpty').style.display = 'flex'
    $('ssLink').style.display  = 'none'
  }

  $('result').className = 'show'
  $('result').scrollIntoView({behavior:'smooth', block:'start'})
}

$('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') analyze() })
</script>
</body>
</html>
